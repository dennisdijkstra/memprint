syntax = "proto3";

package renderer;

option go_package = "github.com/dennisdijkstra/memprint/proto/renderer";

service RendererService {
  rpc RenderPoster(RenderRequest) returns (RenderResponse);
}

message RenderRequest {
  int32  pid        = 1;
  int32  tid        = 2;
  uint64 heap_addr  = 3;
  uint64 heap_size  = 4;
  int32  fd         = 5;
  int32  nr_openat  = 6;
  int32  nr_mmap    = 7;
  int32  nr_write   = 8;
  int32  nr_fsync   = 9;
  uint32 checksum          = 10;

  int32  num_goroutines    = 11;
  int32  num_cpu           = 12;
  int32  go_max_procs      = 13;
  uint32 num_gc            = 14;
  uint64 gc_pause_total_ns = 15;
  int32  page_size         = 16;
  int32  file_pages        = 17;
  double file_entropy      = 18;
  string magic_bytes       = 19;
}

message RenderResponse {
  bytes  png_data = 1;
  string error    = 2;
}