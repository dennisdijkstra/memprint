services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     memprint
      POSTGRES_PASSWORD: memprint
      POSTGRES_DB:       memprint
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memprint"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      FILE_SERVICE_URL: file:50051
      REDIS_URL:         redis://redis:6379
      GATEWAY_PORT:      "8080"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  file:
    build:
      context: .
      dockerfile: services/file/Dockerfile
    ports:
      - "50051:50051"
    env_file: .env
    environment:
      DATABASE_URL:      postgres://memprint:memprint@postgres:5432/memprint?sslmode=disable
      RABBITMQ_URL:      amqp://guest:guest@rabbitmq:5672/
      FILE_SERVICE_PORT: "50051"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  render:
    build:
      context: .
      dockerfile: services/render/Dockerfile
    env_file: .env
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  notification:
    build:
      context: .
      dockerfile: services/notifications/Dockerfile
    env_file: .env
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
